name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, typecheck, test & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: pnpm test

      - name: DB migrations in sync with schema
        # `db:generate` writes nothing when the committed migrations already
        # match src/lib/db/schema.ts, so a dirty tree means someone changed the
        # schema without regenerating. Runs offline — no database needed.
        run: |
          pnpm run db:generate
          if [ -n "$(git status --porcelain drizzle/)" ]; then
            echo "::error::drizzle/ is out of date — run 'pnpm run db:generate' and commit the result."
            git status --porcelain drizzle/
            exit 1
          fi

      - name: Build
        run: pnpm run build
